<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Usine</title>

    <!-- évite erreur favicon -->
    <link rel="icon" href="data:,">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #0b3d91;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 220px;
            max-width: 90%;
        }

        .container {
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #0b3d91;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 20px;
        }

        .btn:hover {
            background: #06285f;
        }
    </style>
</head>

<body>

<header>
    <img
        src="https://tse3.mm.bing.net/th/id/OIP.D3sAoHIsSv62lILMupQYwwHaC0?cb=thfc1&w=517&h=197&rs=1&pid=ImgDetMain&o=7&rm=3"
        alt="Logo"
        class="logo"
    >

    <h1>Layout Usine</h1>
</header>

<div class="container">
    <div class="card">
        <h2>PDF Layout Usine</h2>

        <!-- IMPORTANT -->
        <a href="./usine.pdf" target="_blank" class="btn">
            Open PDF
        </a>
    </div>
</div>

</body>
</html>
